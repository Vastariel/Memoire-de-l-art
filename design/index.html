<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mémoire de l'art — UI kit</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin:0; background:var(--cream-100); min-height:100%; }
  body { display:flex; align-items:center; justify-content:center; padding:40px 16px; box-sizing:border-box;
    font-family:var(--font-sans); -webkit-font-smoothing:antialiased; }
  * { -webkit-tap-highlight-color: transparent; }
  .mda-btn { transition: transform .12s var(--ease-out), background .15s; }
  .mda-btn:active { transform: scale(.97); }
  .mda-tap { transition: opacity .12s; }
  .mda-tap:active { opacity:.62; }
  input::placeholder { color: var(--fg3); }
  @keyframes mdaPulse { 0%,100% { opacity:.55; } 50% { opacity:1; } }
  @keyframes mdaCellIn { from { opacity:0; transform:scale(.55); } to { opacity:1; transform:scale(1); } }
  @keyframes mdaFade { from { opacity:0; } to { opacity:1; } }
  @keyframes mdaSheet { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mosaic.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens1.jsx"></script>
<script type="text/babel" src="screens2.jsx"></script>
<script type="text/babel" src="screens3.jsx"></script>
<script type="text/babel" src="screens4.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
